<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1f36">
<meta name="apple-mobile-web-app-title" content="IPTV">
<title>IPTV Player</title>

<style>
:root {
  --bg: #f1f4f9; --card: #ffffff; --card-border: #e2e6ed;
  --text: #1a1f36; --text2: #5a6178; --text3: #8b92a5;
  --accent: #2563eb; --accent2: #3b82f6; --accent-light: #eef2ff;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --shadow: 0 1px 2px rgba(0,0,0,.05), 0 1px 4px rgba(0,0,0,.04);
  --bar-bg: rgba(0,0,0,.75);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg: #11151f; --card: #1c2230; --card-border: #2a3142;
  --text: #edf2f7; --text2: #a0aec0; --text3: #66748a;
  --accent: #60a5fa; --accent2: #3b82f6; --accent-light: #1e293b;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --shadow: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.15);
  --bar-bg: rgba(0,0,0,.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); display: flex; flex-direction: column; }
/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

/* ===== Header ===== */
.player-header { height: 44px; display: flex; align-items: center; padding: 0 12px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 6px; flex-shrink: 0; z-index: 10; }
.player-header .back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text2); font-size: 20px; text-decoration: none; }
.player-header .back:active { background: var(--bg); }
.player-header h1 { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.player-header .ch-count { font-size: 11px; color: var(--text3); font-weight: 400; }
.player-header .header-actions { display: flex; gap: 4px; align-items: center; }
.player-header .header-actions button { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg); color: var(--text2); cursor: pointer; font-size: 14px; }
.player-header .header-actions button:active { transform: scale(.88); }
.player-header .header-actions .theme-btn { border: 1px solid var(--card-border); }

/* ===== Layout ===== */
.app-layout { display: flex; flex: 1; min-height: 0; background: #000; }
/* Sidebar */
.sidebar { width: 320px; min-width: 320px; background: var(--card); display: flex; flex-direction: column; border-right: 1px solid var(--card-border); }
.sidebar .search-box { padding: 8px 12px; flex-shrink: 0; }
.sidebar .search-box input { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--card-border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.sidebar .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.sidebar .group-scroll { overflow-x: auto; flex-shrink: 0; padding: 4px 8px; border-bottom: 1px solid var(--card-border); }
.sidebar .group-scroll .gtabs { display: flex; gap: 4px; white-space: nowrap; }
.sidebar .group-scroll .gtab { padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 500; background: var(--bg); color: var(--text2); cursor: pointer; border: none; }
.sidebar .group-scroll .gtab.active { background: var(--accent-light); color: var(--accent); }
.sidebar .group-scroll .gtab:active { transform: scale(.92); }
.sidebar .ch-list-wrap { flex: 1; overflow-y: auto; }
.sidebar .ch-list-wrap .clist {}
.ch-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; border-left: 3px solid transparent; gap: 8px; min-height: 36px; }
.ch-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.ch-item:hover { background: var(--bg); }
.ch-item.active { background: var(--accent-light); border-left-color: var(--accent); }
.ch-item .cname { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ch-item .cprog { font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; flex-shrink: 0; }
.ch-item .cfav { font-size: 14px; color: var(--text3); width: 20px; text-align: center; flex-shrink: 0; cursor: pointer; }
.ch-item .cfav.on { color: var(--yellow); }
.no-ch { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }

/* ===== Player Area ===== */
.player-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: #000; }
.video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #000; }
.video-wrap video { width: 100%; height: 100%; object-fit: contain; }
.video-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,.5); font-size: 13px; gap: 8px; z-index: 2; }
.video-state .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: rgba(255,255,255,.2); z-index: 1; }
.empty-state span { font-size: 13px; }
.empty-state small { font-size: 11px; color: rgba(255,255,255,.15); }

/* ===== OSD Controls ===== */
.osd { position: absolute; inset: 0; z-index: 5; opacity: 0; transition: opacity .3s; }
.osd.show { opacity: 1; }
.osd-top { position: absolute; top: 0; left: 0; right: 0; padding: 12px 14px; background: linear-gradient(180deg, rgba(0,0,0,.7), transparent); display: flex; align-items: flex-start; gap: 10px; }
.osd-top .osd-info { flex: 1; min-width: 0; }
.osd-top .osd-info .osd-name { color: #fff; font-size: 15px; font-weight: 600; }
.osd-top .osd-info .osd-prog { color: rgba(255,255,255,.6); font-size: 12px; margin-top: 2px; }
.osd-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px; padding-bottom: calc(12px + var(--safe-bottom)); background: linear-gradient(0deg, rgba(0,0,0,.7), transparent); }
.osd-bottom .osd-bar { display: flex; align-items: center; justify-content: center; gap: 24px; }
.osd-bottom .osd-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,.12); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.osd-bottom .osd-btn:active { transform: scale(.85); }
.osd-bottom .osd-btn.play-big { width: 52px; height: 52px; font-size: 22px; background: var(--accent); }
.osd-bottom .osd-btn.small { width: 32px; height: 32px; font-size: 13px; }

/* ===== EPG Bar ===== */
.epg-bar { padding: 8px 14px; background: var(--card); border-top: 1px solid var(--card-border); min-height: 48px; display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; }
.epg-bar .epg-none { color: var(--text3); font-size: 11px; }
.epg-bar .erow { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.epg-bar .erow .now-tag { color: var(--accent); font-weight: 600; font-size: 11px; white-space: nowrap; }
.epg-bar .erow .epg-title { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.epg-bar .erow .epg-time { color: var(--text3); font-size: 11px; white-space: nowrap; }
.epg-bar .enext { margin-top: 3px; padding-top: 3px; border-top: 1px solid var(--card-border); display: flex; align-items: center; gap: 6px; font-size: 11px; }
.epg-bar .enext .elabel { color: var(--text3); white-space: nowrap; }
.epg-bar .enext .enext-title { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ===== Install Banner ===== */
.install-banner { display: none; padding: 8px 12px; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; text-align: center; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
.install-banner:active { opacity: .85; }
.install-banner .x { margin-left: auto; font-size: 14px; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
.install-banner .x:active { background: rgba(255,255,255,.2); }

/* ===== Refresh overlay ===== */


/* ===== Mobile ===== */
@media (max-width: 820px) {
  .sidebar { width: 100%; min-width: 0; border-right: none; }
  .player-area { width: 100%; }
  .app-layout.m-list .sidebar { display: flex; }
  .app-layout.m-list .player-area { display: none; }
  .app-layout.m-player .sidebar { display: none; }
  .app-layout.m-player .player-area { display: flex; }
  .mobile-tab { display: flex!important; }
}
@media (min-width: 821px) {
  .mobile-tab { display: none!important; }
}
.mobile-tab { display: none; height: 44px; background: var(--card); border-top: 1px solid var(--card-border); flex-shrink: 0; }
.mobile-tab button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; font-size: 10px; color: var(--text3); border: none; background: none; cursor: pointer; }
.mobile-tab button.active { color: var(--accent); }
.mobile-tab button:active { transform: scale(.92); }
.mobile-tab button .mi { font-size: 17px; line-height: 1; }

/* ===== TV optimizations ===== */
@media (hover: none) and (pointer: coarse) {
  /* TV remote: larger focus indicators */
  .ch-item:focus-visible { outline: 3px solid var(--accent); }
  .osd-btn:focus-visible { outline: 3px solid var(--accent); }
  .gtab:focus-visible { outline: 2px solid var(--accent); }
}
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <span>📲 安装 IPTV Player 到主屏幕</span>
  <span class="x" onclick="event.stopPropagation();dismissInstall()">✕</span>
</div>

<div class="player-header">
  <a class="back" href="./index.html">‹</a>
  <h1>IPTV Player <span class="ch-count" id="chCount"></span></h1>
  <div class="header-actions">
    <button onclick="toggleFavFilter()" id="favBtn" title="只看收藏">☆</button>
    <button id="installBtn" style="display:none" onclick="promptInstall()">📲</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
</div>

<div class="app-layout m-list" id="appLayout">
  <div class="sidebar">
    <div class="search-box"><input id="searchInput" placeholder="搜索频道…" oninput="onSearch()" autocomplete="off"></div>
    <div class="group-scroll"><div class="gtabs" id="groupTabs"></div></div>
    <div class="ch-list-wrap" id="chListWrap"><div class="clist" id="chList"></div></div>
  </div>
  <div class="player-area">
    <div class="video-wrap" id="videoWrap">
      <div class="empty-state" id="emptyState">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>选择一个频道</span>
        <small id="remoteHint"></small>
      </div>
      <video id="videoEl" playsinline preload="none" style="display:none"></video>
      <div class="video-state" id="videoState" style="display:none">
        <div class="spinner" id="spinner"></div>
        <span id="stateText">加载中…</span>
      </div>
      <div class="osd" id="osd">
        <div class="osd-top">
          <div class="osd-info">
            <div class="osd-name" id="osdName">—</div>
            <div class="osd-prog" id="osdProg">‎</div>
          </div>
        </div>
        <div class="osd-bottom">
          <div class="osd-bar">
            <button class="osd-btn small" onclick="prevChannel()">⏮</button>
            <button class="osd-btn play-big" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="osd-btn small" onclick="nextChannel()">⏭</button>
          </div>
        </div>
      </div>
    </div>
    <div class="epg-bar" id="epgBar"><div class="epg-none">加载节目中…</div></div>
    <div class="mobile-tab">
      <button class="active" onclick="switchMobile('list')"><span class="mi">📋</span>列表</button>
      <button onclick="switchMobile('player')"><span class="mi">▶️</span>播放</button>
    </div>
  </div>
</div>

<script>
// ===== Config =====
const BASE = 'https://iptv-live-btg.pages.dev/p/a25fcf8d';
const M3U = BASE + '/live.m3u?_=' + Date.now();
const EPG = BASE + '/e.xml?_=' + Date.now();

// ===== Variables =====
let channels = [], epgData = {};
let favorites = JSON.parse(localStorage.getItem('iptv-favs') || '[]');
let currentIdx = -1, currentGroup = '全部', searchQ = '', onlyFavs = false;
let isPlaying = false, isMobile = window.innerWidth <= 820;
let osdTimer = null;

// ===== Theme =====
const theme = localStorage.getItem('iptv-theme') || 'light';
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('iptv-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
}

// Proxy: HTTP streams go through Cloudflare Pages Function (bypasses mixed-content blocking)
function streamUrl(url) {
  if (location.protocol === 'https:' && url.startsWith('http://')) {
    return '/p/a25fcf8d/px/' + encodeURIComponent(url);
  }
  return url;
}

// ===== PWA Install =====
let installPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  installPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
  document.getElementById('installBanner').style.display = 'flex';
});
function promptInstall() {
  if (!installPrompt) return;
  installPrompt.prompt();
  installPrompt.userChoice.then(() => { installPrompt = null; });
  document.getElementById('installBtn').style.display = 'none';
}
function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
}

// ===== Parse M3U =====
function parseM3U(text) {
  const lines = text.split('\n'), result = [];
  let ch = null;
  for (let line of lines) {
    line = line.trim();
    if (line.startsWith('#EXTINF')) {
      ch = { name: '', url: '', group: '未分类', logo: '' };
      let m = line.match(/group-title="([^"]*)"/);
      if (m) ch.group = m[1];
      let lm = line.match(/tvg-logo="([^"]*)"/);
      if (lm) ch.logo = lm[1];
      let nm = line.split(',').pop().trim();
      if (nm) ch.name = nm;
    } else if (ch && line && !line.startsWith('#') && line.startsWith('http')) {
      ch.url = line.split('|')[0].trim();
      if (ch.name && ch.url) result.push(ch);
      ch = null;
    }
  }
  return result;
}

// ===== Parse EPG =====
function parseEPG(xmlText) {
  const data = {};
  let re = /<programme[^>]*start="([^"]*)"[^>]*stop="([^"]*)"[^>]*channel="([^"]*)">[\s\S]*?<title>([\s\S]*?)<\/title>/g;
  let m;
  while ((m = re.exec(xmlText)) !== null) {
    let chId = m[3].trim(), title = m[4].trim().replace(/<!\[CDATA\[|\]\]>/g, '');
    let start = parseXmltvTime(m[1]), stop = parseXmltvTime(m[2]);
    if (!data[chId]) data[chId] = [];
    data[chId].push({ title, start, stop });
  }
  for (let k in data) data[k].sort((a,b) => a.start - b.start);
  return data;
}
function parseXmltvTime(s) {
  let m = s.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
  if (!m) return 0;
  return new Date(m[1]+'-'+m[2]+'-'+m[3]+'T'+m[4]+':'+m[5]+':'+m[6]+'+08:00').getTime();
}
function getProgram(name) {
  let now = Date.now(), list = epgData[name];
  if (!list) {
    let base = name.replace(/HD|高清|超高清|\(.*?\)/g,'').trim();
    for (let k in epgData) {
      let kb = k.replace(/HD|高清|超高清|\(.*?\)/g,'').trim();
      if (kb === base || k.indexOf(base)>=0 || base.indexOf(k)>=0) { list = epgData[k]; break; }
    }
  }
  if (!list) return null;
  let cur = null, nxt = null;
  for (let i = 0; i < list.length; i++) {
    if (list[i].start <= now && list[i].stop > now) cur = list[i];
    if (list[i].start > now && !nxt) nxt = list[i];
  }
  return { current: cur, next: nxt };
}

// ===== Load Data =====
async function loadData() {
  try {
    let r = await fetch(M3U);
    channels = parseM3U(await r.text());
  } catch(e) { console.error('M3U error', e); }
  try {
    let r = await fetch(EPG);
    epgData = parseEPG(await r.text());
  } catch(e) { console.error('EPG error', e); }
  document.getElementById('chCount').textContent = '(' + channels.length + ')';
  renderGroups(); renderChannels();
}

// ===== Groups =====
function getGroups() {
  let g = ['全部'], s = {};
  for (let c of channels) if (c.group && !s[c.group]) { s[c.group] = true; g.push(c.group); }
  return g;
}
function renderGroups() {
  let html = '', gs = getGroups();
  for (let g of gs) {
    let cnt = getFilteredForGroup(g).length;
    html += '<button class="gtab' + (g===currentGroup?' active':'') + '" onclick="setGroup(\'' + g.replace(/'/g,"\\'") + '\')">' + g + ' <span style="font-weight:400;opacity:.6">' + cnt + '</span></button>';
  }
  document.getElementById('groupTabs').innerHTML = html;
}
function getFilteredForGroup(g) {
  let list = channels.slice();
  if (g !== '全部') list = list.filter(c => c.group === g);
  if (onlyFavs) list = list.filter(c => favorites.indexOf(c.name) >= 0);
  return list;
}
function getFiltered() {
  return getFilteredForGroup(currentGroup);
}

// ===== Render =====
function renderChannels() {
  let list = getFiltered(), html = '';
  if (list.length === 0) { document.getElementById('chList').innerHTML = '<div class="no-ch">'+(onlyFavs?'没有收藏的频道':searchQ?'没有匹配的频道':'暂无频道')+'</div>'; return; }
  for (let i = 0; i < list.length; i++) {
    let c = list[i], idx = channels.indexOf(c);
    let active = idx === currentIdx, fav = favorites.indexOf(c.name) >= 0;
    let prog = getProgram(c.name);
    let progText = prog && prog.current ? prog.current.title : '';
    html += '<div class="ch-item' + (active?' active':'') + '" onclick="playChannel(' + idx + ')" tabindex="0" data-idx="' + idx + '">';
    html += '<div class="cname">' + escHtml(c.name) + '</div>';
    if (progText) html += '<div class="cprog">' + escHtml(progText) + '</div>';
    html += '<div class="cfav' + (fav?' on':'') + '" onclick="event.stopPropagation();toggleFav(' + idx + ')">' + (fav?'★':'☆') + '</div>';
    html += '</div>';
  }
  document.getElementById('chList').innerHTML = html;
}
function escHtml(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== Navigation =====
function setGroup(g) { currentGroup = g; searchQ = ''; document.getElementById('searchInput').value = ''; renderGroups(); renderChannels(); }
function onSearch() { searchQ = document.getElementById('searchInput').value; renderChannels(); }
function toggleFavFilter() {
  onlyFavs = !onlyFavs;
  document.getElementById('favBtn').textContent = onlyFavs ? '★' : '☆';
  document.getElementById('favBtn').style.color = onlyFavs ? '#eab308' : '';
  renderGroups(); renderChannels();
}
function toggleFav(idx) {
  let name = channels[idx].name;
  let fi = favorites.indexOf(name);
  if (fi >= 0) favorites.splice(fi, 1); else favorites.push(name);
  localStorage.setItem('iptv-favs', JSON.stringify(favorites));
  renderChannels();
}

// ===== Playback =====
// ===== Playback =====
function playChannel(idx) {
  if (idx < 0 || idx >= channels.length) return;
  currentIdx = idx;
  let ch = channels[idx];
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('osdName').textContent = ch.name;
  renderChannels();
  updateEPG(ch.name);
  showOSD();
  if (isMobile) switchMobile('player');
  
  // Native video only - works with SW proxy on HTTPS
  let video = document.getElementById('videoEl');
  let state = document.getElementById('videoState');
  let spinner = document.getElementById('spinner');
  
  video.pause();
  video.removeAttribute('src');
  video.style.display = 'none';
  state.style.display = 'flex';
  spinner.style.display = 'block';
  document.getElementById('stateText').textContent = '';
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  
  video.src = streamUrl(ch.url);
  video.style.display = 'block';
  
  function onPlay() {
    state.style.display = 'none';
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
  }
  video.addEventListener('play', onPlay, { once: true });
  video.addEventListener('canplay', onPlay, { once: true });
  
  let pp = video.play();
  if (pp !== undefined) pp['catch'](function(){
    spinner.style.display = 'none';
  });
  video.addEventListener('error', function(){ spinner.style.display = 'none'; }, { once: true });
  
  // Scroll
  let el = document.querySelector('.ch-item[data-idx="' + currentIdx + '"]');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function togglePlay() {
  let v = document.getElementById('videoEl');
  if (v.paused) { v.play()['catch'](()=>{}); document.getElementById('playBtn').textContent = '⏸'; isPlaying = true; }
  else { v.pause(); document.getElementById('playBtn').textContent = '▶'; isPlaying = false; }
}

function prevChannel() {
  let list = getFiltered();
  for (let i = 0; i < list.length; i++) {
    if (channels.indexOf(list[i]) === currentIdx && i > 0) { playChannel(channels.indexOf(list[i-1])); return; }
  }
}
function nextChannel() {
  let list = getFiltered();
  for (let i = 0; i < list.length; i++) {
    if (channels.indexOf(list[i]) === currentIdx && i < list.length-1) { playChannel(channels.indexOf(list[i+1])); return; }
  }
}

// ===== OSD =====
function showOSD() {
  document.getElementById('osd').classList.add('show');
  clearTimeout(osdTimer);
  osdTimer = setTimeout(() => document.getElementById('osd').classList.remove('show'), 3000);
}
document.getElementById('videoWrap').addEventListener('click', (e) => {
  if (e.target.closest('.osd') || e.target.closest('.video-state')) return;
  let osd = document.getElementById('osd');
  osd.classList.toggle('show');
  if (osd.classList.contains('show')) { clearTimeout(osdTimer); osdTimer = setTimeout(() => osd.classList.remove('show'), 3000); }
});

// ===== Keyboard / TV Remote =====
document.addEventListener('keydown', (e) => {
  if (currentIdx < 0) return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); prevChannel(); }
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); nextChannel(); }
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); togglePlay(); }
  showOSD();
});

// ===== EPG =====
function updateEPG(name) {
  let el = document.getElementById('epgBar');
  let prog = getProgram(name);
  if (!prog || (!prog.current && !prog.next)) { el.innerHTML = '<div class="epg-none">暂无节目信息</div>'; return; }
  let html = '';
  if (prog.current) {
    let end = new Date(prog.current.stop).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    html += '<div class="erow"><span class="now-tag">● 现在</span><span class="epg-title">' + escHtml(prog.current.title) + '</span><span class="epg-time">~' + end + '</span></div>';
    document.getElementById('osdProg').textContent = prog.current.title;
  }
  if (prog.next) {
    let ns = new Date(prog.next.start).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    html += '<div class="enext"><span class="elabel">接下来</span><span class="enext-title">' + escHtml(prog.next.title) + '</span><span class="epg-time">' + ns + '</span></div>';
  }
  el.innerHTML = html;
}

// ===== Mobile =====
function switchMobile(mode) {
  let app = document.getElementById('appLayout');
  app.classList.remove('m-list','m-player');
  app.classList.add('m-' + mode);
  let btns = document.querySelectorAll('.mobile-tab button');
  btns[0].classList.toggle('active', mode==='list');
  btns[1].classList.toggle('active', mode==='player');
}

// ===== Init =====
loadData();
window.addEventListener('resize', () => { isMobile = window.innerWidth <= 820; });
