<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IPTV Live · 频道状态看板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f1f4f9;
    --card: #ffffff;
    --text: #1a1f36;
    --text2: #5a6a7e;
    --text3: #8a9aaa;
    --accent: #2563eb;
    --accent-bg: rgba(37, 99, 235, 0.08);
    --card-border: #e4e9f0;
    --card-shadow: 0 1px 6px rgba(0,0,0,0.06), 0 2px 16px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] {
    --bg: #11151f;
    --card: #1c2230;
    --text: #edf2f7;
    --text2: #9aa8c0;
    --text3: #5a6a82;
    --accent: #60a5fa;
    --accent-bg: rgba(96, 165, 250, 0.1);
    --card-border: #2a3242;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
    --bg: #11151f;
    --card: #1c2230;
    --text: #edf2f7;
    --text2: #9aa8c0;
    --text3: #5a6a82;
    --accent: #60a5fa;
    --accent-bg: rgba(96, 165, 250, 0.1);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .landing {
    max-width: 620px; width: 100%;
    text-align: center;
  }
  .logo-wrap {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 32px rgba(37, 99, 235, 0.2);
    position: relative;
  }
  .logo-wrap svg {
    width: 42px; height: 42px;
    display: block;
  }
  h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px; color: var(--text2);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    text-align: left; margin-bottom: 32px;
  }
  .feature {
    background: var(--card);
    border: 1px solid var(--card-border, #e4e9f0);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .feature .f-icon { font-size: 20px; margin-bottom: 6px; }
  .feature .f-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .feature .f-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
  .enter-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 36px;
    background: var(--accent);
    color: #fff; font-size: 16px; font-weight: 600;
    border: none; border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
    transition: all 0.2s;
    text-decoration: none;
  }
  .enter-btn:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(37, 99, 235, 0.35);
  }
  .enter-btn:active { transform: translateY(0) scale(0.97); }
  .theme-btn {
    position: fixed; top: 16px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text2); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 10;
    box-shadow: var(--card-shadow, 0 1px 6px rgba(0,0,0,0.06));
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .theme-btn:active { transform: scale(0.9); }
  .footer {
    margin-top: 40px;
    font-size: 12px; color: var(--text3);
  }
  @media (max-width: 520px) {
    .features { grid-template-columns: 1fr; }
    h1 { font-size: 24px; }
    .logo-wrap { width: 64px; height: 64px; border-radius: 16px; }
    .logo-wrap svg { width: 38px; height: 34px; }
    .enter-btn { padding: 12px 28px; font-size: 15px; }
  }
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleLandingTheme()" id="landingThemeBtn">🌙</button>
<div class="landing">
  <div class="logo-wrap">
  <svg viewBox="0 0 80 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Pixel TV icon -->
    <!-- TV body (pixel grid, each cell = 3x3, grid 8x8) -->
    <rect x="2" y="5" width="24" height="18" rx="2" fill="white" opacity="0.95"/>
    <!-- Screen -->
    <rect x="5" y="8" width="11" height="12" rx="1" fill="rgba(255,255,255,0.2)"/>
    <!-- Play triangle on screen -->
    <path d="M8 10 L14 14 L8 18 Z" fill="white" opacity="0.6"/>
    <!-- Knobs (bright dots on the right side of TV) -->
    <rect x="18" y="9" width="3" height="3" rx="0.5" fill="rgba(255,255,255,0.5)"/>
    <rect x="18" y="14" width="3" height="3" rx="0.5" fill="rgba(255,255,255,0.5)"/>
    <!-- Antennas -->
    <line x1="8" y1="5" x2="4" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="14" y1="5" x2="18" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Antenna tips -->
    <circle cx="4" cy="0" r="1" fill="white" opacity="0.9"/>
    <circle cx="18" cy="0" r="1" fill="white" opacity="0.9"/>
    <!-- TV feet -->
    <path d="M8 23 L6 28 M18 23 L20 28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Bold TV Text -->
    <g transform="translate(30, 4)">
      <!-- T -->
      <rect x="0" y="0" width="16" height="4" rx="1" fill="white"/>
      <rect x="6" y="4" width="4" height="22" rx="1" fill="white"/>
      <!-- V -->
      <path d="M22 1 L30 24" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M42 1 L34 24" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>
  </svg>
</div>
  <h1>IPTV Live</h1>
  <p class="subtitle">频道状态实时监控看板 · 自动探测 · 一键刷新</p>

  <div class="features">
    <div class="feature">
      <div class="f-icon">📡</div>
      <div class="f-title">频道覆盖</div>
      <div class="f-desc">央视、卫视、地方台、备用源，超过 100 个频道实时监测</div>
    </div>
    <div class="feature">
      <div class="f-icon">⚡</div>
      <div class="f-title">毫秒级延迟</div>
      <div class="f-desc">多线程并发测速，主备源自动切换，低于 0.8s 为极速</div>
    </div>
    <div class="feature">
      <div class="f-icon">🔄</div>
      <div class="f-title">自动更新</div>
      <div class="f-desc">定时探测 + Git 自动推送，数据持续更新不中断</div>
    </div>
    <div class="feature">
      <div class="f-icon">📱</div>
      <div class="f-title">全端适配</div>
      <div class="f-desc">桌面、平板、手机自适应，iOS 风格卡片式布局</div>
    </div>
  </div>

  <a href="/dashboard.html" class="enter-btn">
    进入看板
    <span style="font-size:18px;line-height:1">→</span>
  </a>

  <div class="footer">
    数据由服务器自动探测 · 每 10 分钟更新一次
  </div>
</div>
<script>
  function toggleLandingTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('iptv-theme', next);
    document.getElementById('landingThemeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  }
  (function() {
    const saved = localStorage.getItem('iptv-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('landingThemeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }
  })();
</script>
</body>
</html>
