<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IPTV 频道状态看板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f1f4f9;
    --card: #ffffff;
    --card-hover: #f8fafd;
    --card-border: #e4e9f0;
    --card-shadow: 0 1px 6px rgba(0,0,0,0.06), 0 2px 16px rgba(0,0,0,0.04);
    --text: #1a1f36;
    --text2: #5a6a7e;
    --text3: #8a9aaa;
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.08);
    --yellow: #f59e0b;
    --yellow-bg: rgba(245, 158, 11, 0.08);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.08);
    --accent: #2563eb;
    --accent-bg: rgba(37, 99, 235, 0.08);
    --blue: #3b82f6;
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="dark"] {
    --bg: #11151f;
    --card: #1c2230;
    --card-hover: #242b3a;
    --card-border: #2a3242;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
    --text: #edf2f7;
    --text2: #9aa8c0;
    --text3: #5a6a82;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.12);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251, 191, 36, 0.12);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
    --accent: #60a5fa;
    --accent-bg: rgba(96, 165, 250, 0.1);
    --blue: #93c5fd;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    color: var(--text);
    padding: 0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg);
  }
  .container {
    max-width: 1120px; margin: 0 auto;
    padding: 16px 20px;
  }

  /* ── Card Base ── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
  }
  .card-sm {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    box-shadow: var(--card-shadow);
  }

  /* ── Header ── */
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; margin-bottom: 16px;
    flex-wrap: wrap; gap: 12px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    border: 1px solid var(--card-border);
  }
  .card-header h1 {
    font-size: 20px; font-weight: 600; color: var(--text);
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-header h1 .accent-dot {
    width: 4px; height: 22px;
    background: var(--accent);
    border-radius: 3px;
    display: inline-block;
  }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .theme-toggle {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text2); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .theme-toggle:active { transform: scale(0.88); }
  .update-capsule {
    font-size: 11px; color: var(--text2);
    background: var(--accent-bg);
    padding: 2px 10px; border-radius: 20px;
    border: 1px solid rgba(37, 99, 235, 0.12);
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
    vertical-align: middle;
    font-weight: 500;
  }
  .update-capsule .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Status Bar ── */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; margin-bottom: 10px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text2);
    box-shadow: var(--card-shadow);
  }

  /* ── Cards Row ── */
  .card-row {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 12px;
  }
  .card-row .group-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 14px 18px;
  }
  .card-row .group-card:nth-child(1) { flex: 0 0 auto; }
  .card-row .group-card:nth-child(2) { flex: 1; min-width: 0; display: flex; align-items: center; }
  .card-row .group-card:nth-child(2) .stat-grid { width: 100%; }
  .card-row .group-card:nth-child(3) { flex: 0 0 auto; display: flex; align-items: center; }
  /* Card 1: 频道健康 */
  .health-card-wrap {
    display: flex; align-items: center; gap: 14px;
  }
  .health-card-wrap .donut-sm {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    position: relative;
  }
  .health-card-wrap .donut-sm .hole {
    position: absolute; inset: 7px; border-radius: 50%;
    background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .health-card-wrap .donut-sm .hole .n { font-size: 15px; font-weight: 700; line-height: 1; color: var(--text); }
  .health-card-wrap .donut-sm .hole .l { font-size: 7px; color: var(--text3); line-height: 1; }
  .health-card-wrap .legend {
    display: flex; flex-direction: column; gap: 3px;
    flex: 1;
  }
  .health-card-wrap .legend .item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; white-space: nowrap;
  }
  .health-card-wrap .legend .item .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .health-card-wrap .legend .item .val { color: var(--text2); margin-left: 6px; }

  /* Card 2: 统计 */
  .stat-grid {
    display: flex;
    gap: 4px 10px;
    justify-content: space-evenly;
  }
  .stat-grid .s-item {
    text-align: center;
    flex-shrink: 0;
  }
  .stat-grid .s-item .n {
    font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .stat-grid .s-item .l {
    font-size: 10px; color: var(--text2); font-weight: 500;
    margin-top: 3px; white-space: nowrap;
  }

  /* Card 3: 链接 */
  .url-wrap {
    display: flex; flex-direction: column; gap: 6px;
    width: 100%;
  }
  .url-wrap .u-row {
    display: flex; align-items: center; gap: 6px;
  }
  .url-wrap .u-row .lbl {
    font-size: 11px; color: var(--text2); font-weight: 500;
    flex-shrink: 0;
  }
  .url-wrap .u-row .val {
    font-size: 10px; color: var(--accent);
    padding: 2px 8px; border-radius: 4px;
    background: var(--accent-bg);
    user-select: all; cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .url-wrap .u-row .cpy {
    font-size: 10px; color: var(--text2); cursor: pointer;
    padding: 2px 6px; border-radius: 3px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .url-wrap .u-row .cpy:hover { color: var(--accent); }
  .url-wrap .u-row .cpy.copied { color: var(--green); }
  .num.green { color: var(--green); }
  .num.yellow { color: var(--yellow); }
  .num.red { color: var(--red); }
  .num.blue { color: var(--blue); }
  .num.accent { color: var(--accent); }

  /* ── URL Card ── */
  

  /* ── Toolbar ── */
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    margin-bottom: 12px;
  }
  .search-input {
    flex: 1; min-width: 140px;
    padding: 7px 12px; border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--bg);
    color: var(--text); font-size: 13px;
    outline: none; transition: all 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
  }
  .filter-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  }
  .filter-btn {
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid transparent;
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 12px; font-weight: 500; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--card-border); color: var(--text); }
  .filter-btn.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }
  .filter-btn.bad { color: var(--red); }
  .filter-btn.bad:hover { border-color: rgba(239,68,68,0.3); }
  .filter-btn.bad.active { border-color: var(--red); background: var(--red-bg); }

  /* ── Refresh Button ── */
  .refresh-btn {
    padding: 7px 18px; border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff; cursor: pointer;
    font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: #1d4ed8; }
  .refresh-btn:active { transform: scale(0.96); }
  .refresh-btn:disabled {
    opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none;
    background: var(--text3);
  }

  /* ── Sections ── */
  .section {
    margin-bottom: 8px;
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }

  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 14px; cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--card-hover); }
  .section-header .group-tag {
    width: 3px; height: 16px; border-radius: 2px; flex-shrink: 0;
  }
  .group-tag.cctv { background: var(--accent); }
  .group-tag.weishi { background: #40a8ff; }
  .group-tag.difang { background: #64d2ff; }
  .group-tag.beiyong { background: #6b7280; }
  .group-tag.bad-section { background: var(--red); }

  .section-header .title {
    font-size: 14px; font-weight: 600;
  }
  .section-header .badge {
    font-size: 11px; color: var(--text3);
    padding: 1px 8px; border-radius: 4px;
    background: rgba(255,255,255,0.03);
  }
  .section-header .health-line {
    display: flex; gap: 2px; height: 5px; flex: 1;
    border-radius: 3px; overflow: hidden;
    background: var(--card-border);
  }
  .section-header .health-line .seg.ok { background: var(--green); }
  .section-header .health-line .seg.slow { background: var(--yellow); }
  .section-header .health-line .seg.bad { background: var(--red); }
  .section-header .rate-badge {
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .section-header .arrow {
    font-size: 9px; color: var(--text3); transition: transform 0.2s;
  }
  .section-header .arrow.open { transform: rotate(180deg); }
  .section-body { display: block; }

  /* ── Channel Row ── */
  .channel-row {
    display: grid;
    grid-template-columns: 1fr auto 28px;
    align-items: center; gap: 10px;
    padding: 10px 16px 10px 18px;
    cursor: pointer; transition: background 0.1s;
  }
  .channel-row + .channel-row { border-top: 1px solid var(--card-border); }
  .channel-row:hover { background: var(--card-hover); }

  .channel-info { min-width: 0; }
  .channel-info .name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .channel-info .name .status-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    display: none;
  }
  .channel-info .name .status-dot.ok { background: var(--green); }
  .channel-info .name .status-dot.slow { background: var(--yellow); }
  .channel-info .name .status-dot.bad { background: var(--red); }
  .channel-info .meta {
    font-size: 11px; color: var(--text2);
    margin-top: 2px; display: flex; gap: 10px;
  }
  .source-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .source-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .source-badge.ok { background: var(--green-bg); color: var(--green); }
  .source-badge.slow { background: var(--yellow-bg); color: var(--yellow); }
  .source-badge.bad { background: var(--red-bg); color: var(--red); }
  .source-badge.main { font-weight: 600; border: 1px solid currentColor; }
  .ch-status {
    font-size: 16px; font-weight: 600; justify-self: end;
  }
  .ch-status.ok { color: var(--green); }
  .ch-status.slow { color: var(--yellow); }
  .ch-status.bad { color: var(--red); }

  /* ── Channel Detail ── */
  .channel-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .channel-detail.open { max-height: 400px; }
  .detail-inner { padding: 10px 16px 14px; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table th {
    text-align: left; font-weight: 600; color: var(--text2);
    padding: 4px 8px; font-size: 11px;
    border-bottom: 1px solid var(--card-border);
  }
  .detail-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--card-border);
    vertical-align: middle;
  }
  .detail-table tr:last-child td { border-bottom: none; }
  .latency-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 4px;
  }
  .latency-dot.fast { background: var(--green); }
  .latency-dot.medium { background: var(--yellow); }
  .latency-dot.slow { background: var(--red); }
  .loading, .error-state, .empty-state {
    text-align: center; padding: 60px 20px;
  }
  .loading .big, .error-state .big, .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .loading p, .empty-state p, .error-state p { font-size: 14px; color: var(--text3); }
  .loading h3, .empty-state h3, .error-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .loading .spinner {
    display: inline-block; width: 32px; height: 32px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Spinner (status bar) ── */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Footer ── */
  .footer {
    font-size: 11px; color: var(--text3); text-align: center;
    padding: 20px 0 8px; letter-spacing: 0.5px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4cad4; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a0aab8; }

  /* ── Tablet ── */
  @media (max-width: 780px) {
    body { padding: 10px; }
    

  }

  /* ── Phone ── */
  @media (max-width: 520px) {
    body { padding: 8px; }
    .card-header { padding: 12px 14px; gap: 8px; }
    .card-header h1 { font-size: 17px; }
    .card-row { gap: 8px; }

    .refresh-btn { padding: 6px 12px; font-size: 12px; }







    .section-header { padding: 9px 12px; gap: 6px; }
    .section-header .title { font-size: 13px; }


    .channel-row {
      grid-template-columns: 1fr auto;
      padding: 7px 12px 7px 14px;
    }
    .channel-info .name { font-size: 12px; }
    .channel-info .name .status-dot { display: inline-block; }
    .channel-info .meta { font-size: 10px; }
    .source-badge { font-size: 9px; padding: 1px 5px; }
    .ch-status { display: none; }

    .detail-inner { padding: 6px 10px; }
    .detail-table td { font-size: 10px; padding: 2px 6px; }
    .detail-table th { font-size: 10px; padding: 2px 6px; }
  }
</style>
</head>
<body>
</div>
<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>加载状态数据...</p>
  </div>
</div>

<script>
(async () => {
  const app = document.getElementById('app');
  let data;

  try {
    const res = await fetch('https://iptv-live-btg.pages.dev/status.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    app.innerHTML = `
      <div class="error-state">
        <div class="big">📡</div>
        <h3>数据加载失败</h3>
        <p>${e.message}</p>
        <p style="margin-top:12px;font-size:13px;color:var(--text3)">请确认 status.json 已部署到同目录下</p>
      </div>`;
    return;
  }

  if (!data.channels || data.channels.length === 0) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="big">📭</div>
        <h3>暂无频道数据</h3>
        <p>等待下一次自动探测更新</p>
      </div>`;
    return;
  }

  // ── Helpers ──
  const groupColorMap = {
    '央视':'cctv', '卫视':'weishi', '地方台':'difang', '备用':'beiyong'
  };
  function groupClass(g) {
    return groupColorMap[Object.keys(groupColorMap).find(k => g && g.includes(k))] || 'beiyong';
  }
  function latencyClass(lat) {
    if (lat === null || lat === undefined) return 'bad';
    return lat < 0.8 ? 'ok' : lat < 2.0 ? 'slow' : 'bad';
  }
  function chStatus(ch) {
    if (ch.main.status !== 'ok') return 'bad';
    return ch.main.latency < 0.8 ? 'ok' : ch.main.latency < 2.0 ? 'slow' : 'bad';
  }

  // ── Group data ──
  const groups = {};
  data.channels.forEach(ch => {
    const g = ch.group || '未分类';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });
  const groupOrder = ['央视','卫视','地方台'];
  const groupKeys = Object.keys(groups).sort((a,b) => {
    const ia = groupOrder.indexOf(a), ib = groupOrder.indexOf(b);
    if (ia!==-1 && ib!==-1) return ia-ib;
    if (ia!==-1) return -1; if (ib!==-1) return 1;
    return a.localeCompare(b);
  });

  // ── State ──
  let filter = 'all';
  let searchQuery = '';
  let expandedCh = null;
  let collapsedGroups = [...groupKeys]; // 默认全部折叠
  let refreshStatus = null;
  let refreshMsg = '';

  function computeBreakdown() {
    let ok=0, slow=0, bad=0;
    data.channels.forEach(ch => {
      const s = chStatus(ch);
      if (s==='ok') ok++; else if (s==='slow') slow++; else bad++;
    });
    return { ok, slow, bad, total: ok+slow+bad };
  }

  function getFilteredChannels() {
    let list = filter === 'all' ? data.channels : filter === 'bad'
      ? data.channels.filter(ch => chStatus(ch)!=='ok')
      : (groups[filter]||[]);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(ch => ch.name.toLowerCase().includes(q));
    }
    return list;
  }

  // ── Refresh ──
  async function fetchRefreshStatus() {
    try {
      const r = await fetch('https://iptv-live-btg.pages.dev/refresh.json?_='+Date.now());
      if (r.ok) return await r.json();
    } catch(e) {}
    return null;
  }

  window.copyUrl = function(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
  };

  window.setFilter = function(f) {
    filter = f; expandedCh = null;
    if (f === 'all') {
      collapsedGroups = [...groupKeys];
    } else if (f === 'bad') {
      collapsedGroups = [];
    } else {
      collapsedGroups = groupKeys.filter(k => k !== f);
    }
    render(); // 需要更新工具栏按钮状态
  };
  window.setSearch = function(q) {
    searchQuery = q;
    renderSections();
  };
  window.toggleGroup = function(g) {
    const i = collapsedGroups.indexOf(g);
    if (i > -1) collapsedGroups.splice(i, 1); else collapsedGroups.push(g);
    renderSections();
  };
  window.toggleCh = function(name) { expandedCh = expandedCh === name ? null : name; renderSections(); };

  window.triggerRefresh = function() {
    if (refreshStatus==='sending'||refreshStatus==='requested'||refreshStatus==='running') return;
    refreshStatus = 'sending'; refreshMsg = '发送请求...'; render();
    const sent = navigator.sendBeacon('https://webhook.site/d59be1a7-192a-4fde-acc6-021ed592ae43','probe_trigger');
    if (sent) { refreshStatus='requested'; refreshMsg='已发送请求，等待测速开始...'; render(); startRefreshPoll(); }
    else { refreshStatus='failed'; refreshMsg='请求发送失败'; render(); }
  };

  let refreshPollTimer = null;
  function startRefreshPoll() {
    if (refreshPollTimer) clearInterval(refreshPollTimer);
    const start = Date.now(), maxWait=180000;
    let lastUpdateBefore = data ? data.lastUpdate : null;
    refreshPollTimer = setInterval(async () => {
      if (Date.now()-start > maxWait) {
        clearInterval(refreshPollTimer); refreshPollTimer=null;
        refreshStatus='failed'; refreshMsg='超时，请稍后手动刷新页面'; render(); return;
      }
      try {
        const rf = await fetchRefreshStatus();
        if (rf) {
          if (rf.status==='running') { refreshStatus='running'; refreshMsg='⏳ 正在测速中'+(rf.progress?' ('+rf.progress+')':'...'); render(); }
          else if (rf.status==='completed') { refreshStatus='completed'; refreshMsg='✅ 测速完成，自动部署中'+(rf.duration?' ('+rf.duration+'秒)':''); render(); }
        }
        const sr = await fetch('https://iptv-live-btg.pages.dev/status.json?_='+Date.now());
        if (sr.ok) {
          const nd = await sr.json();
          if (nd.lastUpdate !== lastUpdateBefore && lastUpdateBefore !== null) {
            data = nd; refreshStatus='complete'; refreshMsg='✅ 数据已更新！3秒后自动刷新...';
            clearInterval(refreshPollTimer); refreshPollTimer=null;
            setTimeout(()=>location.reload(), 3000);
            Object.keys(groups).forEach(k=>delete groups[k]);
            data.channels.forEach(ch=>{const g=ch.group||'未分类';if(!groups[g])groups[g]=[];groups[g].push(ch);});
            render(); return;
          }
        }
      } catch(e) {}
    }, 2000);
  }

  // ── 只更新刷新按钮状态（不下全量渲染）──
  function updateRefreshBtn() {
    const btn = document.querySelector('.refresh-btn');
    if (!btn) return;
    const btnMap = { sending:'⏳ 请求中…', requested:'⏳ 已请求', running:'⏳ 测速中', completed:'⏳ 部署中', complete:'✅ 已更新', failed:'❌ 重试' };
    btn.textContent = btnMap[refreshStatus] || '🔄 手动测速';
    btn.disabled = refreshStatus && refreshStatus!=='failed' && refreshStatus!=='completed';
  }

  // ── Render ──
  function render() {
    const bd = computeBreakdown();
    const channels = getFilteredChannels();
    const okDeg = bd.total>0 ? (bd.ok/bd.total*360) : 0;
    const slowDeg = bd.total>0 ? (bd.slow/bd.total*360) : 0;
    const okRate = bd.total>0 ? Math.round(bd.ok/bd.total*100) : 0;
    const slowRate = bd.total>0 ? Math.round(bd.slow/bd.total*100) : 0;
    const badRate = bd.total>0 ? Math.round(bd.bad/bd.total*100) : 0;

    const btnMap = { sending:'⏳ 请求中…', requested:'⏳ 已请求', running:'⏳ 测速中', completed:'⏳ 部署中', complete:'✅ 已更新', failed:'❌ 重试' };
    const btnLabel = btnMap[refreshStatus] || '🔄 手动测速';
    const btnDisabled = refreshStatus && refreshStatus!=='failed' && refreshStatus!=='completed';

    const statusBar = refreshStatus ? `
      <div class="status-bar">
        ${refreshStatus==='requested'||refreshStatus==='running'?'<span class="spinner"></span>':''}
        ${refreshStatus==='complete'?'✅':''}
        ${refreshMsg}
        ${refreshStatus==='complete'?'<span style="font-size:12px;color:var(--text3);margin-left:auto">刷新中...</span>':''}
      </div>` : '';

    const icons = { ok:'✓', slow:'⚠', bad:'✕' };

    let html = `
      <div class="card-header">
        <div class="header-left">
          <h1><span class="accent-dot"></span>📺 IPTV 频道状态 <span class="update-capsule"><span class="dot"></span>${data.lastUpdate||'未知'}</span></h1>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()" title="切换日夜模式">${getThemeIcon()}</button>
          <button class="refresh-btn" onclick="triggerRefresh()" ${btnDisabled?'disabled':''}>${btnLabel}</button>
        </div>
      </div>
      ${statusBar}
      <div class="card-row">
        <div class="group-card">
          <div class="health-card-wrap">
            <div class="donut-sm" style="background:conic-gradient(
              var(--green) 0deg ${okDeg}deg,
              var(--yellow) ${okDeg}deg ${okDeg+slowDeg}deg,
              var(--red) ${okDeg+slowDeg}deg 360deg
            )">
              <div class="hole">
                <span class="n">${bd.ok}</span>
                <span class="l">/${bd.total}</span>
              </div>
            </div>
            <div class="legend">
              <div class="item"><span class="dot" style="background:var(--green)"></span>正常 ${bd.ok} <span class="val">${okRate}%</span></div>
              <div class="item"><span class="dot" style="background:var(--yellow)"></span>缓慢 ${bd.slow} <span class="val">${slowRate}%</span></div>
              <div class="item"><span class="dot" style="background:var(--red)"></span>异常 ${bd.bad} <span class="val">${badRate}%</span></div>
            </div>
          </div>
        </div>
        <div class="group-card">
          <div class="stat-grid">
            <div class="s-item"><div class="n" style="color:var(--accent)">${data.stats.channels}</div><div class="l">📡 频道总数</div></div>
            <div class="s-item"><div class="n" style="color:#06b6d4">${data.stats.totalSources}</div><div class="l">🔗 在线源</div></div>
            <div class="s-item"><div class="n" style="color:${okRate>=70?'var(--green)':okRate>=50?'var(--yellow)':'var(--red)'}">${okRate}%</div><div class="l">📊 可用率</div></div>
            <div class="s-item"><div class="n" style="color:${data.stats.mainWithIssues===0?'var(--green)':'#f97316'}">${data.stats.mainWithIssues}</div><div class="l">⚠️ 主源异常</div></div>
            <div class="s-item"><div class="n" style="color:#8b5cf6">${data.duration}s</div><div class="l">⏱ 探测耗时</div></div>
          </div>
        </div>
        <div class="group-card">
          <div class="url-wrap">
            <div class="u-row">
              <span class="lbl">📋</span>
              <span class="val" onclick="this.select()">${'https://iptv-live-btg.pages.dev'}/live.m3u</span>
              <span class="cpy" onclick="copyUrl(this,'${'https://iptv-live-btg.pages.dev'}/live.m3u')">复制</span>
            </div>
            <div class="u-row">
              <span class="lbl">📆</span>
              <span class="val" onclick="this.select()">${'https://iptv-live-btg.pages.dev'}/e.xml</span>
              <span class="cpy" onclick="copyUrl(this,'${'https://iptv-live-btg.pages.dev'}/e.xml')">复制</span>
            </div>
          </div>
        </div>
      </div>
      <div class="toolbar">
        <input class="search-input" id="searchInput" type="text" placeholder="🔍 搜索频道..." value="${searchQuery}" oninput="window.setSearch(this.value)" />
        <div class="filter-bar">
          <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">全部 <span style="font-size:11px;color:var(--text3)">${data.stats.channels}</span></button>
          ${groupKeys.map(g => `<button class="filter-btn ${filter===g?'active':''}" onclick="setFilter('${g}')">${g} <span style="font-size:11px;color:var(--text3)">${groups[g].length}</span></button>`).join('')}
          <button class="filter-btn bad ${filter==='bad'?'active':''}" onclick="setFilter('bad')">⚠️ ${bd.bad}</button>
        </div>
      </div>`;

    // ── 频道列表由 renderSections() 渲染到 #sections-root ──

    html += `<div id="sections-root"></div>`;
    html += `<div class="footer">✦ 数据每2天自动更新 · 手动刷新后约1-2分钟完成 ✦</div>`;
    app.innerHTML = html;
    // 渲染频道列表
    renderSections();
  }

  // ── 单独渲染频道列表（搜索时只刷新这部分，不抖键盘）──
  function renderSections() {
    const sectionsRoot = document.getElementById('sections-root');
    if (!sectionsRoot) return;
    sectionsRoot.innerHTML = buildSectionsHTML();
  }

  function buildSectionsHTML() {
    let groupsHtml = '';
    let renderGroups = [];

    // 搜索模式 → 扁平列表，不分组
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const matched = data.channels.filter(c => c.name.toLowerCase().includes(q));
      if (matched.length > 0) {
        renderGroups = [{ key: `🔍 搜索结果 (${matched.length})`, channels: matched, flat: true }];
      }
    } else if (filter === 'all' || groupKeys.includes(filter)) {
      const tg = filter === 'all' ? groupKeys : [filter];
      tg.forEach(g => {
        let chs = groups[g];
        if (chs.length > 0) renderGroups.push({ key: g, channels: chs });
      });
    } else if (filter === 'bad') {
      let badChs = data.channels.filter(ch => chStatus(ch)!=='ok');
      renderGroups = [{ key: '异常频道', channels: badChs, isBad: true }];
    }



    if (renderGroups.length === 0) {
      return `<div class="empty-state"><div class="big">🔍</div><h3>无匹配频道</h3><p>试试其他搜索词</p></div>`;
    }

    const icons = { ok:'✓', slow:'⚠', bad:'✕' };

    renderGroups.forEach(({ key: gk, channels: chs, isBad, flat }) => {
      const gc = isBad ? 'bad-section' : groupClass(gk);
      const collapsed = flat ? false : collapsedGroups.includes(gk);

      let sectionHtml, sectionBodyHtml = '';

      chs.forEach(ch => {
        const sc = chStatus(ch);
        const exp = expandedCh === ch.name;
        const mainLat = ch.main.status==='ok' ? ch.main.latency+'s' : ch.main.status;
        const okBk = ch.backups.filter(b=>b.status==='ok');
        const badBkCount = ch.backups.filter(b=>b.status!=='ok').length;

        sectionBodyHtml += `<div class="channel-row" onclick="toggleCh('${ch.name.replace(/'/g,"\\'")}')">
          <div class="channel-info">
            <div class="name"><span class="status-dot ${sc}"></span>${ch.name}</div>
            <div class="meta">
              <span>主 ${mainLat}</span>
              ${okBk.length>0?`<span>备 ${okBk.length} 在线</span>`:''}
              ${badBkCount>0?`<span style="color:var(--red)">${badBkCount} 离线</span>`:''}
            </div>
          </div>
          <div class="source-row">
            <span class="source-badge ok main">主 ${mainLat}</span>
            ${okBk.slice(0,3).map((b,i)=>`<span class="source-badge ${latencyClass(b.latency)}">备${i+1} ${b.latency}s</span>`).join('')}
          </div>
          <div class="ch-status ${sc}">${icons[sc]}</div>
        </div>
        <div class="channel-detail ${exp?'open':''}">
          <div class="detail-inner">
          <table class="detail-table">
            <tr><th style="width:60px">类型</th><th style="width:55px">延迟</th><th style="width:45px">状态</th><th>URL</th></tr>
            <tr>
              <td style="color:var(--blue)">主源</td>
              <td><span class="latency-dot ${ch.main.latency<0.8?'fast':ch.main.latency<2?'medium':'slow'}"></span>${ch.main.status==='ok'?ch.main.latency+'s':'-'}</td>
              <td style="color:${ch.main.status==='ok'?'var(--green)':'var(--red)'}">${ch.main.status}</td>
              <td style="color:var(--text3)">${ch.main.url}</td>
            </tr>
            ${ch.backups.map((b,i)=>`<tr>
              <td>备${i+1}</td>
              <td><span class="latency-dot ${b.latency<0.8?'fast':b.latency<2?'medium':'slow'}"></span>${b.status==='ok'?b.latency+'s':'-'}</td>
              <td style="color:${b.status==='ok'?'var(--green)':'var(--red)'}">${b.status}</td>
              <td style="color:var(--text3)">${b.url}</td>
            </tr>`).join('')}
          </table>
          </div>
        </div>`;
      });

      if (flat) {
        // 搜索模式：无分组头，直接列出
        sectionHtml = `<div class="section search-section">
          <div class="section-header" style="cursor:default">
            <span class="group-tag" style="background:var(--accent)"></span>
            <span class="title">${gk}</span>
          </div>
          <div class="section-body" style="display:block">${sectionBodyHtml}</div></div>`;
      } else {
        // 正常分组模式
        let gOk=0,gSlow=0,gBad=0;
        chs.forEach(ch=>{const s=chStatus(ch);if(s==='ok')gOk++;else if(s==='slow')gSlow++;else gBad++;});
        const gTotal = chs.length;
        const gOkPct = gTotal>0 ? (gOk/gTotal*100) : 0;
        const gSlowPct = gTotal>0 ? (gSlow/gTotal*100) : 0;
        const gBadPct = gTotal>0 ? (gBad/gTotal*100) : 0;
        const gOkRate = gTotal>0 ? Math.round(gOk/gTotal*100) : 0;

        sectionHtml = `<div class="section">
          <div class="section-header" onclick="toggleGroup('${gk.replace(/'/g,"\\'")}')">
            <span class="group-tag ${gc}"></span>
            <span class="title">${gk}</span>
            <span class="badge">${chs.length} 频道</span>
            <div class="health-line">
              <div class="seg ok" style="width:${gOkPct}%"></div>
              <div class="seg slow" style="width:${gSlowPct}%"></div>
              <div class="seg bad" style="width:${gBadPct}%"></div>
            </div>
            <span class="rate-badge" style="color:${gOkRate>=70?'var(--green)':gOkRate>=50?'var(--yellow)':'var(--red)'}">${gOkRate}%</span>
            <span class="arrow ${collapsed?'':'open'}">▼</span>
          </div>
          <div class="section-body" style="display:${collapsed?'none':'block'}">${sectionBodyHtml}</div></div>`;
      }

      groupsHtml += sectionHtml;
    });

    return groupsHtml;
  }

  // ── Init ──
  render();
  // 异步检测状态，不重复 render
  setTimeout(async () => {
    const rf = await fetchRefreshStatus();
    if (rf && rf.status === 'running') {
      refreshStatus = 'requested'; refreshMsg = '⏳ 测速进行中，等待结果...';
      updateRefreshBtn();
      startRefreshPoll();
    }
  }, 100);

  setInterval(async () => {
    if (refreshStatus==='requested'||refreshStatus==='running') return;
    try { const r = await fetch('https://iptv-live-btg.pages.dev/status.json?_='+Date.now()); if (r.ok) { data = await r.json(); render(); } } catch(e) {}
  }, 60000);
})();

  function getThemeIcon() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  }
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('iptv-theme', next);
    const btn = document.querySelector('.theme-toggle');
    if (btn) btn.innerHTML = getThemeIcon();
  }
  // Apply saved theme on load
  (function() {
    const saved = localStorage.getItem('iptv-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
</body>
</html>
