<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IPTV 频道状态看板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0e14;
    --surface: #131820;
    --surface2: #1a2230;
    --border: #1e293b;
    --border2: #2a3a52;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --accent: #38bdf8;
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --blue: #38bdf8;
    --blue-bg: rgba(56,189,248,0.1);
    --purple: #a78bfa;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
  }
  .header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .update-badge {
    font-size: 12px; color: var(--text2); background: var(--surface);
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .update-badge .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    display: inline-block; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .refresh-btn {
    padding: 8px 18px; border-radius: 24px; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--blue-bg); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Status Bar ── */
  .status-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 18px; margin-bottom: 16px;
    font-size: 14px; display: flex; align-items: center; gap: 10px;
  }
  .status-bar .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── URL Card ── */
  .url-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 20px;
  }
  .url-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; flex-wrap: wrap;
  }
  .url-row:first-child { padding-top: 0; }
  .url-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    min-width: 52px; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .url-value {
    flex: 1; font-size: 13px; font-family: 'SF Mono', Consolas, monospace;
    color: var(--accent); word-break: break-all; min-width: 0;
    padding: 5px 10px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; cursor: text;
  }
  .copy-btn {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 12px; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--blue-bg); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-bg); }

  /* ── Health Overview ── */
  .health-overview {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .donut-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    display: flex; align-items: center; gap: 18px; flex: 0 0 auto;
  }
  .donut {
    width: 90px; height: 90px; border-radius: 50%;
    position: relative; flex-shrink: 0;
    background: conic-gradient(
      var(--green) 0deg,
      var(--green) var(--ok-deg, 0deg),
      var(--yellow) var(--ok-deg, 0deg),
      var(--yellow) var(--ok-slow-deg, 0deg),
      var(--red) var(--ok-slow-deg, 0deg),
      var(--red) 360deg
    );
  }
  .donut-hole {
    position: absolute; inset: 12px; border-radius: 50%;
    background: var(--surface); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .donut-hole .num { font-size: 20px; font-weight: 700; line-height: 1; }
  .donut-hole .lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .donut-legend { display: flex; flex-direction: column; gap: 4px; }
  .donut-legend .item {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
  }
  .donut-legend .item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .donut-legend .item .val { color: var(--text2); margin-left: auto; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px; flex: 1; min-width: 200px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-card .num {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .stat-card .lbl {
    font-size: 11px; color: var(--text3); font-weight: 500;
    letter-spacing: 0.3px;
  }
  .stat-card .num.green { color: var(--green); }
  .stat-card .num.yellow { color: var(--yellow); }
  .stat-card .num.red { color: var(--red); }
  .stat-card .num.blue { color: var(--blue); }
  .stat-card .num.purple { color: var(--purple); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    align-items: center;
  }
  .search-input {
    flex: 1; min-width: 160px;
    padding: 8px 14px; border-radius: 24px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 12px; font-weight: 500; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--blue-bg); border-color: var(--accent); color: var(--accent); }
  .filter-btn.bad { border-color: var(--red); color: var(--red); }
  .filter-btn.bad.active { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  /* ── Section (Channel Group) ── */
  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    user-select: none;
  }
  .section-header:hover { background: var(--surface2); }
  .section-header .group-tag {
    width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0;
  }
  .group-tag.cctv { background: var(--blue); }
  .group-tag.weishi { background: var(--yellow); }
  .group-tag.difang { background: var(--green); }
  .group-tag.beiyong { background: var(--text3); }

  .section-header .title {
    font-size: 14px; font-weight: 600;
  }
  .section-header .badge {
    font-size: 11px; color: var(--text3);
    background: var(--bg); padding: 2px 10px; border-radius: 10px;
  }
  .section-header .health-line {
    display: flex; gap: 3px; height: 6px; flex: 1; max-width: 200px;
    border-radius: 3px; overflow: hidden;
  }
  .section-header .health-line .seg { transition: width 0.3s; }
  .section-header .health-line .seg.ok { background: var(--green); }
  .section-header .health-line .seg.slow { background: var(--yellow); }
  .section-header .health-line .seg.bad { background: var(--red); }
  .section-header .arrow {
    font-size: 10px; color: var(--text3); transition: transform 0.2s;
    margin-left: auto;
  }
  .section-header .arrow.open { transform: rotate(180deg); }
  .section-body { display: block; }

  /* ── Channel Row ── */
  .channel-row {
    display: grid;
    grid-template-columns: 1fr auto 28px;
    gap: 12px; align-items: center;
    padding: 10px 16px 10px 20px;
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.12s;
  }
  .channel-row:last-child { border-bottom: none; }
  .channel-row:hover { background: var(--surface2); }

  .channel-info {
    display: flex; flex-direction: column; gap: 2px; min-width: 0;
  }
  .channel-info .name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .channel-info .meta {
    font-size: 11px; color: var(--text3);
    display: flex; gap: 8px;
  }

  .source-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .source-badge.ok { background: var(--green-bg); color: var(--green); }
  .source-badge.slow { background: var(--yellow-bg); color: var(--yellow); }
  .source-badge.bad { background: var(--red-bg); color: var(--red); }
  .source-badge.main { outline: 1px solid currentColor; outline-offset: -1px; }

  .ch-status { font-size: 16px; justify-self: end; }
  .ch-status.ok { color: var(--green); }
  .ch-status.slow { color: var(--yellow); }
  .ch-status.bad { color: var(--red); }

  /* ── Detail Panel ── */
  .channel-detail {
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 0; max-height: 0; overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
  }
  .channel-detail.open {
    max-height: 500px; padding: 12px 16px;
  }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table th {
    text-align: left; color: var(--text3); font-weight: 500;
    padding: 4px 8px; border-bottom: 1px solid var(--border);
    font-size: 11px; white-space: nowrap;
  }
  .detail-table td {
    padding: 5px 8px; border-bottom: 1px solid var(--border);
    font-family: 'SF Mono', Consolas, monospace; font-size: 11px;
    word-break: break-all; max-width: 350px;
  }
  .detail-table tr:last-child td { border-bottom: none; }

  .latency-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }
  .latency-dot.fast { background: var(--green); }
  .latency-dot.medium { background: var(--yellow); }
  .latency-dot.slow { background: var(--red); }

  /* ── Backup Badges Row ── */
  .source-row {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    justify-self: end;
  }

  /* ── Empty / Error / Loading ── */
  .empty-state, .error-state, .loading {
    text-align: center; padding: 60px 20px; color: var(--text3);
  }
  .empty-state .big, .error-state .big, .loading .big { font-size: 40px; margin-bottom: 12px; }
  .error-state { color: var(--red); }
  .loading .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  .loading p, .empty-state p, .error-state p { font-size: 14px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    body { padding: 10px; }
    .header h1 { font-size: 18px; }
    .channel-row {
      grid-template-columns: 1fr auto;
      gap: 8px; padding: 10px 14px 10px 16px;
    }
    .ch-status { display: none; }
    .source-row { gap: 4px; }
    .source-badge { font-size: 10px; padding: 1px 6px; }
    .donut-card { flex: 1 1 100%; }
    .donut { width: 72px; height: 72px; }
    .donut-hole { inset: 10px; }
    .donut-hole .num { font-size: 16px; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .stat-card { padding: 10px 12px; }
    .stat-card .num { font-size: 18px; }
    .section-header { padding: 10px 14px; }
    .section-header .health-line { max-width: 100px; }
    .search-input { font-size: 12px; padding: 7px 12px; }
  }

  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .update-badge { font-size: 11px; padding: 4px 10px; }
    .refresh-btn { font-size: 12px; padding: 6px 14px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>加载状态数据...</p>
  </div>
</div>

<script>
(async () => {
  const app = document.getElementById('app');

  // ── Data ──
  let data;

  try {
    const res = await fetch('status.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    app.innerHTML = `
      <div class="error-state">
        <div class="big">📡</div>
        <h3>数据加载失败</h3>
        <p>${e.message}</p>
        <p style="margin-top:12px;font-size:13px;color:var(--text3)">请确认 status.json 已部署到同目录下</p>
      </div>`;
    return;
  }

  if (!data.channels || data.channels.length === 0) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="big">📭</div>
        <h3>暂无频道数据</h3>
        <p>等待下一次自动探测更新</p>
      </div>`;
    return;
  }

  // ── Helpers ──
  const groupColorMap = {
    '央视': 'cctv', '卫视': 'weishi', '地方台': 'difang', '备用': 'beiyong'
  };
  function groupClass(g) {
    const k = Object.keys(groupColorMap).find(k => g && g.includes(k));
    return groupColorMap[k] || 'beiyong';
  }
  function latencyClass(lat) {
    if (lat === null || lat === undefined) return 'bad';
    return lat < 0.8 ? 'ok' : lat < 2.0 ? 'slow' : 'bad';
  }
  function chStatus(ch) {
    if (ch.main.status !== 'ok') return 'bad';
    return ch.main.latency < 0.8 ? 'ok' : ch.main.latency < 2.0 ? 'slow' : 'bad';
  }

  // ── Group data ──
  const groups = {};
  data.channels.forEach(ch => {
    const g = ch.group || '未分类';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });
  const groupOrder = ['央视','卫视','地方台'];
  const groupKeys = Object.keys(groups).sort((a,b) => {
    const ia = groupOrder.indexOf(a), ib = groupOrder.indexOf(b);
    if (ia!==-1 && ib!==-1) return ia-ib;
    if (ia!==-1) return -1; if (ib!==-1) return 1;
    return a.localeCompare(b);
  });

  // ── State ──
  let filter = 'all';
  let searchQuery = '';
  let expandedCh = null;
  let collapsedGroups = [];
  let refreshStatus = null;
  let refreshMsg = '';

  // ── Compute derived data ──
  function computeBreakdown() {
    let ok = 0, slow = 0, bad = 0;
    data.channels.forEach(ch => {
      const s = chStatus(ch);
      if (s === 'ok') ok++;
      else if (s === 'slow') slow++;
      else bad++;
    });
    return { ok, slow, bad, total: ok+slow+bad };
  }

  // ── get filtered channels ──
  function getFilteredChannels() {
    let list = [];
    if (filter === 'all') groupKeys.forEach(g => list.push(...groups[g]));
    else if (filter === 'bad') list = data.channels.filter(ch => chStatus(ch) !== 'ok');
    else list = groups[filter] || [];

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(ch => ch.name.toLowerCase().includes(q));
    }
    return list;
  }

  // ── Refresh state ──
  async function fetchRefreshStatus() {
    try {
      const r = await fetch('refresh.json?_='+Date.now());
      if (r.ok) return await r.json();
    } catch(e) {}
    return null;
  }

  // ── Window functions ──
  window.copyUrl = function(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
  };

  window.setFilter = function(f) { filter = f; expandedCh = null; render(); };
  window.setSearch = function(q) { searchQuery = q; render(); };

  window.toggleGroup = function(g) {
    const idx = collapsedGroups.indexOf(g);
    if (idx > -1) collapsedGroups.splice(idx, 1);
    else collapsedGroups.push(g);
    render();
  };

  window.toggleCh = function(name) {
    expandedCh = expandedCh === name ? null : name;
    render();
  };

  window.triggerRefresh = function() {
    if (refreshStatus === 'sending' || refreshStatus === 'requested' || refreshStatus === 'running') return;
    refreshStatus = 'sending';
    refreshMsg = '发送请求...';
    render();

    const sent = navigator.sendBeacon(
      'https://webhook.site/d59be1a7-192a-4fde-acc6-021ed592ae43',
      'probe_trigger'
    );

    if (sent) {
      refreshStatus = 'requested';
      refreshMsg = '已发送请求，等待测速开始...';
      render();
      startRefreshPoll();
    } else {
      refreshStatus = 'failed';
      refreshMsg = '请求发送失败';
      render();
    }
  };

  let refreshPollTimer = null;
  function startRefreshPoll() {
    if (refreshPollTimer) clearInterval(refreshPollTimer);
    const startTime = Date.now();
    const maxWait = 180000;
    let lastUpdateBefore = data ? data.lastUpdate : null;

    refreshPollTimer = setInterval(async () => {
      if (Date.now() - startTime > maxWait) {
        clearInterval(refreshPollTimer);
        refreshPollTimer = null;
        refreshStatus = 'failed';
        refreshMsg = '超时，请稍后手动刷新页面';
        render();
        return;
      }

      try {
        const rf = await fetchRefreshStatus();
        if (rf) {
          if (rf.status === 'running') {
            refreshStatus = 'running';
            refreshMsg = '⏳ 正在测速中' + (rf.progress ? ' ('+rf.progress+')' : '...');
            render();
          } else if (rf.status === 'completed') {
            refreshStatus = 'completed';
            const dur = rf.duration ? (rf.duration + '秒') : '';
            refreshMsg = '✅ 测速完成，自动部署中' + (dur ? ' ('+dur+')' : '');
            render();
          }
        }

        const sr = await fetch('status.json?_='+Date.now());
        if (sr.ok) {
          const newData = await sr.json();
          if (newData.lastUpdate !== lastUpdateBefore && lastUpdateBefore !== null) {
            data = newData;
            refreshStatus = 'complete';
            refreshMsg = '✅ 数据已更新！3秒后自动刷新...';
            clearInterval(refreshPollTimer);
            refreshPollTimer = null;
            setTimeout(() => location.reload(), 3000);
            Object.keys(groups).forEach(k => delete groups[k]);
            data.channels.forEach(ch => {
              const g = ch.group || '未分类';
              if (!groups[g]) groups[g] = [];
              groups[g].push(ch);
            });
            render();
            return;
          }
        }
      } catch(e) {}

    }, 2000);
  }

  // ── Render ──
  function render() {
    const bd = computeBreakdown();
    const channels = getFilteredChannels();

    // Donut chart degrees
    const okDeg = bd.total > 0 ? (bd.ok / bd.total * 360) : 0;
    const slowDeg = bd.total > 0 ? (bd.slow / bd.total * 360) : 0;
    const okRate = bd.total > 0 ? Math.round(bd.ok / bd.total * 100) : 0;
    const slowRate = bd.total > 0 ? Math.round(bd.slow / bd.total * 100) : 0;
    const badRate = bd.total > 0 ? Math.round(bd.bad / bd.total * 100) : 0;

    // Button label
    const btnMap = {
      sending: '⏳ 请求中…', requested: '⏳ 已请求',
      running: '⏳ 测速中', completed: '⏳ 部署中',
      complete: '✅ 已更新', failed: '❌ 重试'
    };
    const btnLabel = btnMap[refreshStatus] || '🔄 手动测速';
    const btnDisabled = refreshStatus && refreshStatus !== 'failed' && refreshStatus !== 'completed';

    // Refresh status bar
    const statusBar = refreshStatus ? `
      <div class="status-bar">
        ${refreshStatus === 'requested' || refreshStatus === 'running'
          ? '<span class="spinner"></span>' : ''}
        ${refreshStatus === 'complete' ? '✅' : ''}
        ${refreshMsg}
        ${refreshStatus === 'complete'
          ? '<span style="font-size:12px;color:var(--text3);margin-left:auto">页面自动刷新中...</span>'
          : ''}
      </div>` : '';

    // ── Build HTML ──
    let html = `
      <div class="header">
        <h1>📺 IPTV 频道状态</h1>
        <div class="header-actions">
          <span class="update-badge"><span class="dot"></span>${data.lastUpdate || '未知'}</span>
          <button class="refresh-btn" onclick="triggerRefresh()" ${btnDisabled?'disabled':''}>${btnLabel}</button>
        </div>
      </div>
      ${statusBar}
      <div class="url-card">
        <div class="url-row">
          <span class="url-label">频道</span>
          <span class="url-value" onclick="this.select()" readonly>${window.location.origin}/live.m3u</span>
          <button class="copy-btn" onclick="copyUrl(this,'${window.location.origin}/live.m3u')">复制</button>
        </div>
        <div class="url-row" style="padding-top:8px;border-top:1px solid var(--border);margin-top:6px">
          <span class="url-label">节目单</span>
          <span class="url-value" onclick="this.select()" readonly>${window.location.origin}/e.xml</span>
          <button class="copy-btn" onclick="copyUrl(this,'${window.location.origin}/e.xml')">复制</button>
        </div>
      </div>
      <div class="health-overview">
        <div class="donut-card">
          <div class="donut" style="background:conic-gradient(
            var(--green) 0deg,
            var(--green) ${okDeg}deg,
            var(--yellow) ${okDeg}deg,
            var(--yellow) ${okDeg + slowDeg}deg,
            var(--red) ${okDeg + slowDeg}deg,
            var(--red) 360deg
          )">
            <div class="donut-hole">
              <span class="num">${bd.ok}</span>
              <span class="lbl">/ ${bd.total}</span>
            </div>
          </div>
          <div class="donut-legend">
            <div class="item"><span class="dot" style="background:var(--green)"></span>正常 <span class="val">${bd.ok} (${okRate}%)</span></div>
            <div class="item"><span class="dot" style="background:var(--yellow)"></span>缓慢 <span class="val">${bd.slow} (${slowRate}%)</span></div>
            <div class="item"><span class="dot" style="background:var(--red)"></span>异常 <span class="val">${bd.bad} (${badRate}%)</span></div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><span class="num blue">${data.stats.channels}</span><span class="lbl">频道总数</span></div>
          <div class="stat-card"><span class="num blue">${data.stats.totalSources}</span><span class="lbl">在线源数</span></div>
          <div class="stat-card"><span class="num ${okRate>=70?'green':okRate>=50?'yellow':'red'}">${okRate}%</span><span class="lbl">可用率</span></div>
          <div class="stat-card"><span class="num ${data.stats.mainWithIssues===0?'green':'red'}">${data.stats.mainWithIssues}</span><span class="lbl">主源异常</span></div>
          <div class="stat-card"><span class="num purple">${data.duration}s</span><span class="lbl">探测耗时</span></div>
        </div>
      </div>
      <div class="toolbar">
        <input class="search-input" type="text" placeholder="🔍 搜索频道..." value="${searchQuery}" oninput="window.setSearch(this.value)" />
        <div class="filter-bar">
          <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">全部 <span style="font-size:11px;color:var(--text3)">${data.stats.channels}</span></button>
          ${groupKeys.map(g => `<button class="filter-btn ${filter===g?'active':''}" onclick="setFilter('${g}')">${g} <span style="font-size:11px;color:var(--text3)">${groups[g].length}</span></button>`).join('')}
          <button class="filter-btn bad ${filter==='bad'?'active':''}" onclick="setFilter('bad')">⚠️ ${bd.bad}</button>
        </div>
      </div>`;

    // ── Channel sections ──
    const icons = { ok:'✓', slow:'⚠', bad:'✕' };

    // Determine which groups to render
    let renderGroups = [];
    if (filter === 'all' || groupKeys.includes(filter)) {
      const target = (filter === 'all') ? groupKeys : [filter];
      target.forEach(g => {
        let chs = searchQuery
          ? groups[g].filter(ch => ch.name.toLowerCase().includes(searchQuery.toLowerCase()))
          : groups[g];
        if (chs.length > 0) renderGroups.push({ key: g, channels: chs });
      });
    } else if (filter === 'bad') {
      // Build groups from bad channels
      const badChs = data.channels.filter(ch => chStatus(ch) !== 'ok');
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        renderGroups = [{ key: '异常频道', channels: badChs.filter(ch => ch.name.toLowerCase().includes(q)) }];
      } else {
        renderGroups = [{ key: '异常频道', channels: badChs }];
      }
    }

    if (renderGroups.length === 0) {
      html += `<div class="empty-state"><div class="big">🔍</div><h3>无匹配频道</h3><p>试试其他搜索词</p></div>`;
    } else {
      renderGroups.forEach(({ key: gk, channels: chs }) => {
        const gc = groupClass(gk);
        const collapsed = collapsedGroups.includes(gk);

        // Section health
        let gOk = 0, gSlow = 0, gBad = 0;
        chs.forEach(ch => {
          const s = chStatus(ch);
          if (s === 'ok') gOk++;
          else if (s === 'slow') gSlow++;
          else gBad++;
        });
        const gTotal = chs.length;
        const gOkPct = gTotal > 0 ? (gOk/gTotal*100) : 0;
        const gSlowPct = gTotal > 0 ? (gSlow/gTotal*100) : 0;
        const gBadPct = gTotal > 0 ? (gBad/gTotal*100) : 0;

        html += `<div class="section">
          <div class="section-header" onclick="toggleGroup('${gk.replace(/'/g,"\\'")}')">
            <span class="group-tag ${gc}"></span>
            <span class="title">${gk}</span>
            <span class="badge">${chs.length} 频道</span>
            <div class="health-line">
              <div class="seg ok" style="width:${gOkPct}%"></div>
              <div class="seg slow" style="width:${gSlowPct}%"></div>
              <div class="seg bad" style="width:${gBadPct}%"></div>
            </div>
            <span class="arrow ${collapsed?'':'open'}">▼</span>
          </div>
          <div class="section-body" style="display:${collapsed?'none':'block'}">`;

        chs.forEach(ch => {
          const sc = chStatus(ch);
          const exp = expandedCh === ch.name;
          const mainLat = ch.main.status==='ok' ? ch.main.latency+'s' : ch.main.status;
          const okBk = ch.backups.filter(b => b.status === 'ok');
          const badBkCount = ch.backups.filter(b => b.status !== 'ok').length;

          html += `<div class="channel-row" onclick="toggleCh('${ch.name.replace(/'/g,"\\'")}')">
            <div class="channel-info">
              <div class="name">${ch.name}</div>
              <div class="meta">
                <span>主 ${mainLat}</span>
                ${okBk.length > 0 ? `<span>备 ${okBk.length}在线</span>` : ''}
                ${badBkCount > 0 ? `<span style="color:var(--red)">${badBkCount}离线</span>` : ''}
              </div>
            </div>
            <div class="source-row">
              <span class="source-badge ok main">主 ${mainLat}</span>
              ${okBk.slice(0,3).map((b,i) =>
                `<span class="source-badge ${latencyClass(b.latency)}">备${i+1} ${b.latency}s</span>`
              ).join('')}
            </div>
            <div class="ch-status ${sc}">${icons[sc]}</div>
          </div>
          <div class="channel-detail ${exp?'open':''}">
            <table class="detail-table">
              <tr><th style="width:60px">类型</th><th style="width:60px">延迟</th><th style="width:50px">状态</th><th>URL</th></tr>
              <tr>
                <td style="color:var(--accent)">主源</td>
                <td><span class="latency-dot ${ch.main.latency<0.8?'fast':ch.main.latency<2?'medium':'slow'}"></span>${ch.main.status==='ok'?ch.main.latency+'s':'-'}</td>
                <td style="color:${ch.main.status==='ok'?'var(--green)':'var(--red)'}">${ch.main.status}</td>
                <td style="color:var(--text3)">${ch.main.url}</td>
              </tr>
              ${ch.backups.map((b,i) =>
                `<tr>
                  <td>备${i+1}</td>
                  <td><span class="latency-dot ${b.latency<0.8?'fast':b.latency<2?'medium':'slow'}"></span>${b.status==='ok'?b.latency+'s':'-'}</td>
                  <td style="color:${b.status==='ok'?'var(--green)':'var(--red)'}">${b.status}</td>
                  <td style="color:var(--text3)">${b.url}</td>
                </tr>`
              ).join('')}
            </table>
          </div>`;
        });

        html += '</div></div>';
      });
    }

    app.innerHTML = html;
  }

  // ── Init ──
  async function initRefreshStatus() {
    const rf = await fetchRefreshStatus();
    if (rf && rf.status === 'running') {
      refreshStatus = 'requested';
      refreshMsg = '⏳ 测速进行中，等待结果...';
      startRefreshPoll();
    }
    render();
  }

  render();
  initRefreshStatus();

  // ── Auto refresh ──
  setInterval(async () => {
    if (refreshStatus === 'requested' || refreshStatus === 'running') return;
    try {
      const r = await fetch('status.json?_='+Date.now());
      if (r.ok) { data = await r.json(); render(); }
    } catch(e) {}
  }, 60000);
})();
</script>
</body>
</html>
